name: JIS Keymap SVG Conversion

on:
  workflow_dispatch:
  push:
    paths:
      - "keymap-drawer/roBa.svg"

jobs:
  convert-keymap-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Convert keymap SVG to JIS
        run: python keymap-drawer/convert_keymap_svg_to_jis.py

      - name: Commit and push updated SVG
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add keymap-drawer/roBa.svg
          git commit -m "Update roBa.svg (自動変換 by workflow)" || echo "No changes to commit"
          git push
